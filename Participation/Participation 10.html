<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="'viewpoint" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>
    <style>
        .large-message {display:block;}
        .small-message {display:none;}
        @media only screen and (max-width:800px) {
            .large-message {display:none;}
            .small-message {display:block;}
        }
    </style>
</head>

<body>
    <h1>Participation 10</h1>
    <p class="large-message">I'm large</p>
    <p class="small-message">I'm small
    </p>
</body>

</html>
